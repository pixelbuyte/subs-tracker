<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile Preview — Android & iPhone 15 Pro</title>
    <style>
      :root {
        --bg: #0b0b0f;
        --bg-grad-a: #0b0b0f;
        --bg-grad-b: #151520;
        --text: #f5f5f7;
        --muted: #8a8a94;
        --ring: #1f1f28;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: radial-gradient(1200px 800px at 20% 10%, #1a1a2a 0%, transparent 60%),
                    radial-gradient(1000px 700px at 80% 90%, #1b1026 0%, transparent 55%),
                    linear-gradient(180deg, var(--bg-grad-a), var(--bg-grad-b));
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
        color: var(--text);
        min-height: 100vh;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 28px;
      }
      .title {
        font-size: 15px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .controls input[type="text"] {
        background: #13131b;
        border: 1px solid var(--ring);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 10px;
        font-size: 13px;
        width: 340px;
        outline: none;
      }
      .controls input[type="text"]:focus { border-color: #3d3d52; }
      .controls button {
        background: #13131b;
        border: 1px solid var(--ring);
        color: var(--text);
        padding: 8px 14px;
        border-radius: 10px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .controls button:hover { background: #1c1c28; border-color: #3d3d52; }

      .stage {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: center;
        gap: 56px;
        padding: 8px 24px 56px;
      }
      .device-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .device-label {
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      /* ---------- iPhone 15 Pro ---------- */
      .iphone {
        --w: 393px;
        --h: 852px;
        --bezel: 12px;
        --radius: 55px;
        width: calc(var(--w) + var(--bezel) * 2);
        height: calc(var(--h) + var(--bezel) * 2);
        position: relative;
        background: linear-gradient(145deg, #1c1c1e, #2a2a2e 40%, #141416);
        border-radius: var(--radius);
        padding: var(--bezel);
        box-shadow:
          0 40px 80px rgba(0, 0, 0, 0.6),
          0 0 0 1.5px #3a3a3f,
          inset 0 0 0 1.5px #000;
      }
      .iphone::before, .iphone::after {
        content: "";
        position: absolute;
        background: #2a2a2e;
        border-radius: 2px;
        box-shadow: inset 0 0 0 1px #111;
      }
      /* volume up */
      .iphone::before {
        left: -3px;
        top: 160px;
        width: 3px;
        height: 70px;
      }
      /* power button */
      .iphone::after {
        right: -3px;
        top: 200px;
        width: 3px;
        height: 110px;
      }
      .iphone .side-btn {
        position: absolute;
        background: #2a2a2e;
        border-radius: 2px;
        box-shadow: inset 0 0 0 1px #111;
      }
      .iphone .mute { left: -3px; top: 110px; width: 3px; height: 34px; }
      .iphone .voldown { left: -3px; top: 242px; width: 3px; height: 70px; }

      .iphone-screen {
        position: relative;
        width: var(--w);
        height: var(--h);
        border-radius: calc(var(--radius) - var(--bezel));
        background: #000;
        overflow: hidden;
      }
      .iphone-screen iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      /* Dynamic Island */
      .dynamic-island {
        position: absolute;
        top: 11px;
        left: 50%;
        transform: translateX(-50%);
        width: 124px;
        height: 37px;
        background: #000;
        border-radius: 20px;
        z-index: 5;
        box-shadow: 0 0 0 0.5px #1a1a1a;
      }
      /* iOS status bar overlay (time + indicators) */
      .ios-status {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 32px 0;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        pointer-events: none;
        z-index: 4;
        font-feature-settings: "tnum";
      }
      .ios-status .right {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .ios-status svg { display: block; }
      /* Home indicator */
      .home-indicator {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 134px;
        height: 5px;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 3px;
        z-index: 5;
        pointer-events: none;
      }

      /* ---------- Android (Pixel-ish) ---------- */
      .android {
        --w: 412px;
        --h: 915px;
        --bezel: 10px;
        --radius: 48px;
        width: calc(var(--w) + var(--bezel) * 2);
        height: calc(var(--h) + var(--bezel) * 2);
        position: relative;
        background: linear-gradient(145deg, #1a1a1d, #242428 40%, #121215);
        border-radius: var(--radius);
        padding: var(--bezel);
        box-shadow:
          0 40px 80px rgba(0, 0, 0, 0.6),
          0 0 0 1.5px #33333a,
          inset 0 0 0 1.5px #000;
      }
      /* power + volume rocker */
      .android .power {
        position: absolute;
        right: -3px;
        top: 170px;
        width: 3px;
        height: 60px;
        background: #2a2a2e;
        border-radius: 2px;
        box-shadow: inset 0 0 0 1px #111;
      }
      .android .vol {
        position: absolute;
        right: -3px;
        top: 240px;
        width: 3px;
        height: 110px;
        background: #2a2a2e;
        border-radius: 2px;
        box-shadow: inset 0 0 0 1px #111;
      }
      .android-screen {
        position: relative;
        width: var(--w);
        height: var(--h);
        border-radius: calc(var(--radius) - var(--bezel));
        background: #000;
        overflow: hidden;
      }
      .android-screen iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      /* Hole-punch camera */
      .punch-hole {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        width: 14px;
        height: 14px;
        background: #000;
        border-radius: 50%;
        z-index: 5;
        box-shadow: 0 0 0 1px #1a1a1a, inset 0 0 2px #0a0a0a;
      }
      /* Android status bar overlay */
      .android-status {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px 0;
        font-size: 13px;
        font-weight: 500;
        color: #fff;
        pointer-events: none;
        z-index: 4;
        font-feature-settings: "tnum";
      }
      .android-status .right {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      /* Gesture pill */
      .gesture-pill {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 108px;
        height: 4px;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 3px;
        z-index: 5;
        pointer-events: none;
      }

      footer {
        text-align: center;
        padding: 16px;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 920px) {
        .stage { gap: 36px; padding: 8px 12px 48px; }
        .iphone, .android { transform: scale(0.78); transform-origin: top center; }
        .device-wrap + .device-wrap { margin-top: -120px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title">Subs Tracker · Mobile Preview</div>
      <div class="controls">
        <input id="url" type="text" value="https://subs-tracker-two.vercel.app/" />
        <button id="load">Load</button>
        <button id="reload">Reload</button>
        <button id="home">/</button>
        <button id="features">/#features</button>
      </div>
    </header>

    <section class="stage">
      <!-- Android -->
      <div class="device-wrap">
        <div class="android" aria-label="Android phone frame">
          <div class="power"></div>
          <div class="vol"></div>
          <div class="android-screen">
            <div class="android-status">
              <span id="a-time">9:41</span>
              <div class="right">
                <!-- signal -->
                <svg width="14" height="12" viewBox="0 0 14 12" fill="none">
                  <rect x="0" y="8" width="2" height="4" rx="0.5" fill="#fff"/>
                  <rect x="4" y="5" width="2" height="7" rx="0.5" fill="#fff"/>
                  <rect x="8" y="2" width="2" height="10" rx="0.5" fill="#fff"/>
                  <rect x="12" y="0" width="2" height="12" rx="0.5" fill="#fff" opacity="0.5"/>
                </svg>
                <!-- wifi -->
                <svg width="14" height="12" viewBox="0 0 14 12" fill="none">
                  <path d="M7 11.2a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="#fff"/>
                  <path d="M3.2 7.6a5.4 5.4 0 0 1 7.6 0l-1.2 1.2a3.7 3.7 0 0 0-5.2 0L3.2 7.6Z" fill="#fff"/>
                  <path d="M1 5.4a8.5 8.5 0 0 1 12 0l-1.2 1.2a6.8 6.8 0 0 0-9.6 0L1 5.4Z" fill="#fff"/>
                </svg>
                <!-- battery -->
                <svg width="22" height="12" viewBox="0 0 22 12" fill="none">
                  <rect x="0.5" y="1.5" width="18" height="9" rx="2" stroke="#fff" stroke-opacity="0.8"/>
                  <rect x="2" y="3" width="14" height="6" rx="1" fill="#fff"/>
                  <rect x="19.5" y="4" width="2" height="4" rx="1" fill="#fff" opacity="0.8"/>
                </svg>
              </div>
            </div>
            <div class="punch-hole"></div>
            <iframe
              id="android-frame"
              src="https://subs-tracker-two.vercel.app/"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
            <div class="gesture-pill"></div>
          </div>
        </div>
        <div class="device-label">Android · Pixel 8 Pro · 412 × 915</div>
      </div>

      <!-- iPhone 15 Pro -->
      <div class="device-wrap">
        <div class="iphone" aria-label="iPhone 15 Pro frame">
          <span class="side-btn mute"></span>
          <span class="side-btn voldown"></span>
          <div class="iphone-screen">
            <div class="ios-status">
              <span id="i-time">9:41</span>
              <div class="right">
                <!-- signal -->
                <svg width="18" height="12" viewBox="0 0 18 12" fill="none">
                  <rect x="0" y="8" width="3" height="4" rx="0.7" fill="#fff"/>
                  <rect x="5" y="5" width="3" height="7" rx="0.7" fill="#fff"/>
                  <rect x="10" y="2" width="3" height="10" rx="0.7" fill="#fff"/>
                  <rect x="15" y="0" width="3" height="12" rx="0.7" fill="#fff"/>
                </svg>
                <!-- wifi -->
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                  <path d="M8 11.2a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Z" fill="#fff"/>
                  <path d="M3.8 7.6a6 6 0 0 1 8.4 0l-1.4 1.4a4 4 0 0 0-5.6 0L3.8 7.6Z" fill="#fff"/>
                  <path d="M1 5a9.5 9.5 0 0 1 14 0l-1.4 1.4a7.6 7.6 0 0 0-11.2 0L1 5Z" fill="#fff"/>
                </svg>
                <!-- battery -->
                <svg width="28" height="14" viewBox="0 0 28 14" fill="none">
                  <rect x="0.5" y="1.5" width="23" height="11" rx="3" stroke="#fff" stroke-opacity="0.9"/>
                  <rect x="2" y="3" width="20" height="8" rx="2" fill="#fff"/>
                  <rect x="24.5" y="5" width="2.5" height="4" rx="1" fill="#fff" opacity="0.9"/>
                </svg>
              </div>
            </div>
            <div class="dynamic-island"></div>
            <iframe
              id="iphone-frame"
              src="https://subs-tracker-two.vercel.app/"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
            <div class="home-indicator"></div>
          </div>
        </div>
        <div class="device-label">iPhone 15 Pro · 393 × 852</div>
      </div>
    </section>

    <footer>
      Tip: change the URL above and press <b>Load</b>, or jump to a route with the quick buttons.
    </footer>

    <script>
      const ipf = document.getElementById("iphone-frame");
      const apf = document.getElementById("android-frame");
      const urlInput = document.getElementById("url");
      const base = () => urlInput.value.trim().replace(/\/+$/, "");

      document.getElementById("load").addEventListener("click", () => {
        const u = urlInput.value.trim();
        if (!u) return;
        ipf.src = u;
        apf.src = u;
      });
      document.getElementById("reload").addEventListener("click", () => {
        ipf.src = ipf.src;
        apf.src = apf.src;
      });
      document.getElementById("home").addEventListener("click", () => {
        const u = base() + "/";
        ipf.src = u;
        apf.src = u;
      });
      document.getElementById("features").addEventListener("click", () => {
        const u = base() + "/#features";
        ipf.src = u;
        apf.src = u;
      });

      function tick() {
        const d = new Date();
        const hh = d.getHours().toString().padStart(2, "0");
        const mm = d.getMinutes().toString().padStart(2, "0");
        const t = hh + ":" + mm;
        document.getElementById("i-time").textContent = t;
        document.getElementById("a-time").textContent = t;
      }
      tick();
      setInterval(tick, 30_000);
    </script>
  </body>
</html>
